@let timeFrom = tuiTimeFrom();
@let timeTo = tuiTimeTo();

<div
  class="multiple-input-box"
  [tuiDropdown]="dropdownContent"
  [tuiDropdownManual]="open"
  (click)="onClick()"
  (tuiActiveZoneChange)="onActiveZone($event)"
>
  <div class="input-items">
    <input
      #inputItem
      class="input-main"
      [placeholder]="datePlaceholder()"
      [maskito]="computedDateMask()"
      [disabled]="disabled"
      [class.show-placeholder]="empty() && !isFocused()"
      [ngModelOptions]="{ standalone: true }"
      [ngModel]="fromValue()"
      (ngModelChange)="onDateValueChange($event, EInputType.DATE_FROM)"
      (keyup)="onKeyup($event, EInputType.DATE_FROM)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
    <input
      #inputItem
      [placeholder]="TIME_PLACEHOLDER"
      [maskito]="computedTimeMask()"
      [disabled]="disabled"
      [style.width.ch]="timeLength()"
      [ngModelOptions]="{ standalone: true }"
      [ngModel]="fromTimeValue()"
      (ngModelChange)="onTimeValueChange($event, EInputType.TIME_FROM)"
      (keyup)="onKeyup($event, EInputType.TIME_FROM)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
    <span class="delimiter">-</span>
    <input
      #inputItem
      class="input-main"
      [placeholder]="DATE_PLACEHOLDER"
      [maskito]="computedDateMask()"
      [disabled]="disabled"
      [ngModelOptions]="{ standalone: true }"
      [ngModel]="toValue()"
      (ngModelChange)="onDateValueChange($event, EInputType.DATE_TO)"
      (keyup)="onKeyup($event, EInputType.DATE_TO)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
    <input
      #inputItem
      [placeholder]="TIME_PLACEHOLDER"
      [maskito]="computedTimeMask()"
      [disabled]="disabled"
      [style.width.ch]="timeLength()"
      [ngModelOptions]="{ standalone: true }"
      [ngModel]="toTimeValue()"
      (ngModelChange)="onTimeValueChange($event, EInputType.TIME_TO)"
      (keyup)="onKeyup($event, EInputType.TIME_TO)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
  </div>

  <div class="t-content">
    <div class="icon-wrapper">
      <!-- placeholder for sproc-param-invalid-icon -->
      <ng-content></ng-content>

      @if (forceClear()) {
        <button
          tuiIconButton
          size="xs"
          appearance="action-grayscale"
          type="button"
          class="t-clear"
          (click)="clear()"
        >
          Очистить
        </button>
      }
    </div>

    <tui-icon class="calendar" [icon]="'@sproc.calendar-custom'"> </tui-icon>
  </div>
</div>

<ng-template #dropdownContent>
  <tui-calendar-range
    [value]="computedTuiDayRange()"
    [min]="calendarMinDay()"
    [max]="calendarMaxDay()"
    [maxLength]="maxLength()"
    [minLength]="minLength()"
    (valueChange)="onCalendarChange($event)"
  />

  <div class="time-range">
    <tui-textfield [tuiTextfieldSize]="'s'" [style.width.px]="250">
      <input
        tuiInputTime
        [mode]="timeMode()"
        [ngModel]="timeFrom"
        (ngModelChange)="updateTimeFrom($event)"
      />
      <tui-icon [icon]="'@tui.clock'" class="clock-icon" [style.font-size.px]="16" />
    </tui-textfield>

    <tui-textfield [tuiTextfieldSize]="'s'" [style.width.px]="250">
      <input
        tuiInputTime
        [mode]="timeMode()"
        [ngModel]="timeTo"
        (ngModelChange)="updateTimeTo($event)"
      />
      <tui-icon [icon]="'@tui.clock'" class="clock-icon" [style.font-size.px]="16" />
    </tui-textfield>
  </div>
</ng-template>
