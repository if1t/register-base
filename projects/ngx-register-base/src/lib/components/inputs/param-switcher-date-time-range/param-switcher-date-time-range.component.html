<div class="param-custom-template">
  <div *ngIf="label" class="label">
    <span *ngIf="label" class="label__text">{{ label }}</span>
    <span *ngIf="required" class="label--required">*</span>
  </div>

  <sproc-param-switcher [switchers]="switchers" [formControl]="switcherControl" />

  <sproc-param-date-time-range
    [placeholder]="placeholder()"
    [timeMode]="timeMode()"
    [maxLength]="maxLength()"
    [min]="min()"
    [max]="max()"
    [formControl]="control"
    [forceClear]="forceClear"
    [paramStyle]="paramStyle"
  />
</div>
