<div class="sproc-sliding-panel" [attr.show]="isOpen()">
  <div
    #headerContainer
    class="display-contents"
    (waResizeObserver)="onHeaderResize(headerContainer)"
  >
    <ng-content select="[header]" />
  </div>

  <tui-scrollbar class="scrolled-content">
    <ng-content />
  </tui-scrollbar>

  <div
    #footerContainer
    class="display-contents"
    (waResizeObserver)="onFooterResize(footerContainer)"
  >
    <ng-content select="[footer]" />
  </div>
</div>
