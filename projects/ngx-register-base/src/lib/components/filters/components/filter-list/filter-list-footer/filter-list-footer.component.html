<div class="sproc-filter-list-footer-container">
  <ng-container [ngSwitch]="filterState$ | async">
    <ng-container *ngSwitchCase="FilterState.FILTER_LIST">
      <button
        tuiButton
        class="filter-list__button"
        size="s"
        [disabled]="applyButtonDisabled"
        (click)="onApplyFilter()"
      >
        {{ footerApplyButtonLabel }}
      </button>
    </ng-container>

    <ng-container *ngSwitchCase="FilterState.SAVED_LIST">
      <button
        tuiButton
        class="filter-list__button"
        size="s"
        [disabled]="acceptButtonDisabled"
        (click)="onApplySavedFilter()"
      >
        Применить
      </button>
    </ng-container>

    <ng-container *ngSwitchCase="FilterState.ON_EDIT_FILTER" [ngTemplateOutlet]="onEditFilter" />

    <ng-container *ngSwitchCase="FilterState.ON_SAVE_FILTER" [ngTemplateOutlet]="onEditFilter" />

    <ng-template #onEditFilter>
      <button
        tuiButton
        class="filter-list__button"
        size="s"
        [disabled]="acceptButtonDisabled"
        (click)="onSaveFilter()"
      >
        Сохранить
      </button>
    </ng-template>
  </ng-container>
</div>
