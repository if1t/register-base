<div class="sproc-filter-list-saved">
  <tui-loader [showLoader]="$any(loading$ | async)" [overlay]="true">
    <span *ngIf="savedItems.length === 0" class="input-text-12px"
      >Сохраненых фильтров не найдено
    </span>
    <div
      *ngFor="let item of savedItems; let i = index"
      [class.selected]="item.selected"
      class="sproc-filter-list-saved-item"
      (click)="onSelect(item.id)"
    >
      <div class="input-text-12px">{{ item.name }}</div>

      <div class="sproc-filter-list-saved-item-action-buttons">
        <button
          tuiButton
          size="m"
          [appearance]="item.favorite ? 'flat' : 'flat-grayscale'"
          (click)="onFavorite(item.id)"
        >
          <tui-icon [icon]="item.favorite ? '@sproc.star-fill' : '@sproc.star-empty'" />
        </button>
        <button appearance="flat-grayscale" size="m" tuiButton (click)="onEdit(item.id)">
          <tui-icon [icon]="'@sproc.pencil'" />
        </button>
        <button appearance="flat-grayscale" size="m" tuiButton (click)="onDelete(item.id)">
          <tui-icon [icon]="'@sproc.trash'" />
        </button>
      </div>
    </div>
  </tui-loader>
</div>
