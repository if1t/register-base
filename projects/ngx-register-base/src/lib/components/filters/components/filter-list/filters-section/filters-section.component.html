<div class="panel-head" (click)="toggleHeader()">
  <div class="title" [class.title--has-filters]="haveAppliedFilters()">
    <span class="title__font">{{ label() }}</span>
  </div>

  <tui-icon
    class="icon-size--16"
    [icon]="isOpen() ? '@sproc.chevron-up' : '@sproc.chevrons-down'"
  />
</div>

<div class="filters-block" [attr.show]="isOpen()">
  <ng-content />
</div>
