<ng-container [ngSwitch]="filterState$ | async">
  <h4 *ngSwitchCase="FilterState.FILTER_LIST">{{ filterListHeaderTitle }}</h4>
  <h4 *ngSwitchCase="FilterState.SAVED_LIST">Сохраненные фильтры</h4>
  <h4 *ngSwitchCase="FilterState.ON_EDIT_FILTER">Редактирование фильтра</h4>
  <h4 *ngSwitchCase="FilterState.ON_SAVE_FILTER">Сохранить фильтр</h4>
</ng-container>

<div class="sproc-filter-list-header-actions-button">
  <ng-container [ngSwitch]="filterState$ | async">
    <ng-container *ngSwitchCase="FilterState.FILTER_LIST" [ngTemplateOutlet]="filterListTemplate" />
    <ng-container *ngSwitchCase="FilterState.SAVED_LIST" [ngTemplateOutlet]="savedListTemplate" />
    <ng-container
      *ngSwitchCase="FilterState.ON_EDIT_FILTER"
      [ngTemplateOutlet]="saveFilterTemplate"
    />
    <ng-container
      *ngSwitchCase="FilterState.ON_SAVE_FILTER"
      [ngTemplateOutlet]="saveFilterTemplate"
    />
    <ng-container *ngSwitchDefault [ngTemplateOutlet]="backButtonTemplate" />
  </ng-container>
</div>

<ng-template #filterListTemplate>
  <ng-container *ngIf="showPin">
    <button
      tuiButton
      class="icon-button"
      size="s"
      [appearance]="isPin ? 'flat' : 'flat-grayscale'"
      (click)="onTogglePin()"
    >
      <tui-icon
        class="icon-size--16"
        [icon]="isPin ? '@sproc.thumbtack-directly' : '@sproc.thumbtack'"
      />
    </button>
    <sproc-divider layout="vertical" />
  </ng-container>

  <button
    tuiButton
    class="icon-button"
    appearance="flat-grayscale"
    size="s"
    (click)="onSavedList()"
  >
    <tui-icon [icon]="'@sproc.star-empty'" />
  </button>

  <button tuiButton class="icon-button" appearance="flat-grayscale" size="s" (click)="onSave()">
    <tui-icon [icon]="'@sproc.floppy'" />
  </button>

  <sproc-divider layout="vertical" />

  <button
    tuiButton
    class="icon-button"
    appearance="flat"
    size="s"
    [disabled]="applyButtonDisabled"
    (click)="onApplyFilter()"
  >
    <tui-icon class="check-icon" [icon]="'@sproc.check'" />
  </button>

  <button tuiButton class="icon-button" appearance="flat-grayscale" size="s" (click)="onReset()">
    <tui-icon [icon]="'@sproc.eraser'" />
  </button>

  @if (showCloseButton) {
    <button class="icon-button close-icon" appearance="flat" size="s" tuiButton (click)="onClose()">
      <tui-icon [icon]="'@sproc.xmark'" />
    </button>
  }
</ng-template>

<ng-template #savedListTemplate>
  <button
    tuiButton
    class="icon-button"
    appearance="flat"
    size="s"
    [disabled]="acceptButtonDisabled"
    (click)="onApplySavedFilter()"
  >
    <tui-icon class="check-icon" [icon]="'@sproc.check'" />
  </button>

  <ng-container *ngTemplateOutlet="backButtonTemplate" />
</ng-template>

<ng-template #saveFilterTemplate>
  <button
    tuiButton
    class="icon-button"
    appearance="flat-grayscale"
    size="s"
    [disabled]="acceptButtonDisabled"
    (click)="onSaveFilter()"
  >
    <tui-icon [icon]="'@sproc.floppy'" />
  </button>

  <ng-container *ngTemplateOutlet="backButtonTemplate" />
</ng-template>

<ng-template #backButtonTemplate>
  <button
    tuiButton
    class="icon-button"
    appearance="flat-grayscale"
    size="s"
    tuiHint="Главное меню фильтров"
    (click)="onBack()"
  >
    <tui-icon [icon]="'@sproc.arrow-turn-up-left'" />
  </button>
</ng-template>
